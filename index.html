<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی تاقیکردنەوەی هۆشیاری شۆفێری</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050B14] text-slate-200 font-sans selection:bg-fuchsia-500/30 selection:text-white overflow-x-hidden antialiased">
    
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none flex items-center justify-center bg-[#050B14]">
        <div class="absolute inset-0 z-10 bg-noise mix-blend-overlay"></div>
        <div class="aurora-1 absolute w-[70vw] h-[70vw] max-w-[900px] max-h-[900px] bg-[#00F0FF] rounded-full mix-blend-screen filter blur-[140px] opacity-25 left-[-15%] top-[-10%]"></div>
        <div class="aurora-2 absolute w-[60vw] h-[60vw] max-w-[800px] max-h-[800px] bg-[#8A2BE2] rounded-full mix-blend-screen filter blur-[150px] opacity-35 right-[-10%] top-[15%]"></div>
        <div class="aurora-3 absolute w-[65vw] h-[65vw] max-w-[850px] max-h-[850px] bg-[#FF00FF] rounded-full mix-blend-screen filter blur-[160px] opacity-25 left-[15%] bottom-[-20%]"></div>
        <div class="absolute inset-0 bg-[#050B14]/40 backdrop-blur-[60px] z-0"></div>
    </div>

    <div class="relative z-10 flex flex-col min-h-screen">
        
        <nav class="fixed top-0 left-0 right-0 z-50 py-4 glass-panel">
            <div class="max-w-7xl mx-auto px-4 md:px-12 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex items-center justify-between w-full sm:w-auto gap-3">
                    <div class="flex items-center gap-3 group">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-400 to-fuchsia-500 flex items-center justify-center p-0.5 shadow-lg shadow-purple-500/20">
                            <div class="w-full h-full bg-[#050B14] rounded-[10px] flex items-center justify-center">
                                <i data-lucide="sparkles" class="w-5 h-5 text-cyan-400"></i>
                            </div>
                        </div>
                        <span id="nav-title" class="font-bold text-xl md:text-2xl tracking-tight text-white font-nrt">تاقیکردنەوەی هاتووچۆ</span>
                    </div>
                </div>

                <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
                    <div class="flex rounded-full bg-white/5 p-1 border border-white/10 text-xs font-nrt">
                        <button id="lang-ku-btn" class="px-3 py-1.5 rounded-full transition-all bg-gradient-to-r from-cyan-500 to-purple-600 text-white font-bold">کوردی</button>
                        <button id="lang-ar-btn" class="px-3 py-1.5 rounded-full transition-all text-slate-400 hover:text-white">العربية</button>
                    </div>
                    
                    <div id="creator-tag" class="text-sm md:text-base font-nrt text-slate-400 border-r-2 border-fuchsia-500 pr-3 text-right">
                        ئامادەکراوە لە لایەن: <span class="text-white font-bold">محمد گەردی</span>
                    </div>
                </div>
            </div>
        </nav>

        <main id="start-screen" class="flex-grow flex flex-col items-center justify-center pt-40 px-6 pb-20">
            <div class="max-w-3xl mx-auto text-center space-y-8 relative">
                <div class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full glass-card border border-white/10 text-sm font-medium text-cyan-200 mb-2">
                    <i data-lucide="activity" class="w-4 h-4 text-fuchsia-400"></i>
                    <span id="start-badge" class="font-nrt text-base">بارکردنی پرسیارەکان...</span>
                </div>

                <h1 id="start-heading" class="text-4xl md:text-6xl lg:text-7xl font-extrabold tracking-tight text-white leading-[1.3] font-nrt">
                    سیستەمی هۆشیاری <br />
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-400 to-fuchsia-500">
                        شۆفێری نێودەوڵەتی
                    </span>
                </h1>

                <div class="flex items-center justify-center pt-8">
                    <button id="start-btn" class="relative group w-full sm:w-auto px-10 py-4 rounded-full font-semibold text-white overflow-hidden transition-all hover:scale-105 active:scale-95 shadow-[0_0_40px_-10px_rgba(138,43,226,0.6)]">
                        <div class="absolute inset-0 bg-gradient-to-r from-cyan-500 via-purple-600 to-fuchsia-500 opacity-90"></div>
                        <span id="start-btn-text" class="relative flex items-center justify-center gap-3 text-xl font-nrt">
                            دەستپێکردن <i data-lucide="arrow-left" class="w-6 h-6 group-hover:-translate-x-1 transition-transform"></i>
                        </span>
                    </button>
                </div>
            </div>
        </main>

        <main id="quiz-screen" class="hidden flex-grow flex-col lg:flex-row gap-6 pt-40 px-4 md:px-6 pb-20 w-full max-w-7xl mx-auto items-start">
            
            <div class="relative glass-panel rounded-2xl md:rounded-[32px] overflow-hidden flex flex-col shadow-[0_0_80px_-20px_rgba(0,240,255,0.2)] flex-1 w-full">
                <div class="p-6 md:p-10 flex flex-col">
                    
                    <div class="flex items-center justify-between mb-8 pb-6 border-b border-white/10">
                        <div class="flex gap-2 items-center">
                            <div class="w-3 h-3 rounded-full bg-cyan-400 animate-pulse"></div>
                            <span id="status-badge" class="text-sm text-cyan-400 font-nrt">تاقیکردنەوەی چالاک</span>
                        </div>
                        <div id="question-counter" class="text-lg font-bold text-white bg-white/5 border border-white/10 px-5 py-2 rounded-full font-nrt">
                            پرسیار
                        </div>
                    </div>

                    <div class="mb-10">
                        <h2 id="question-text" class="text-2xl md:text-3xl font-bold text-white leading-[1.6] font-nrt text-right"></h2>
                    </div>

                    <div id="options-container" class="grid grid-cols-1 gap-4 mb-8"></div>

                    <div class="mt-4 flex justify-between items-center gap-4">
                        <button id="prev-btn" class="px-6 py-3 rounded-full font-medium text-slate-400 glass-card border border-white/10 hover:text-white hover:bg-white/5 transition-all flex items-center gap-2 font-nrt">
                            <i data-lucide="chevron-right" class="w-5 h-5"></i> <span id="prev-btn-text">پرسیاری پێشوو</span>
                        </button>
                        
                        <button id="next-btn" class="px-8 py-3.5 rounded-full font-medium text-white bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:scale-105 active:scale-95 transition-all flex items-center gap-2 font-nrt text-lg shadow-lg shadow-purple-500/20">
                            <span id="next-btn-text">پرسیاری دواتر</span> <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        </button>
                    </div>

                </div>
            </div>

            <div class="w-full lg:w-80 glass-panel rounded-2xl p-6 flex flex-col max-h-[70vh] lg:max-h-[80vh]">
                <h3 id="grid-title" class="text-lg font-bold text-white mb-4 font-nrt flex items-center gap-2 border-b border-white/10 pb-3">
                    <i data-lucide="layers" class="text-cyan-400 w-5 h-5"></i>
                    پرسیارەکان (بازدان بۆ ژمارە)
                </h3>
                <div id="questions-grid" class="grid grid-cols-5 gap-2 overflow-y-auto pr-1 flex-grow"></div>
            </div>
        </main>

        <main id="result-screen" class="hidden flex-grow flex-col items-center justify-center pt-40 px-6 pb-20 w-full max-w-2xl mx-auto">
            <div class="glass-panel rounded-[32px] p-10 text-center w-full shadow-[0_0_80px_-20px_rgba(138,43,226,0.3)]">
                <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-tr from-cyan-400 to-fuchsia-500 flex items-center justify-center mb-6">
                    <i data-lucide="check-circle" class="w-10 h-10 text-white"></i>
                </div>
                <h2 id="result-heading" class="text-4xl font-bold text-white mb-6 font-nrt">کۆتایی تاقیکردنەوە</h2>
                <div id="result-score-text" class="text-xl text-slate-300 mb-10 font-nrt">
                    ئەنجامی تۆ: <span id="score-display" class="text-4xl font-bold text-cyan-400 mx-2">0</span> لە <span id="total-display" class="text-2xl font-bold text-white">0</span>
                </div>
                <button id="restart-btn" class="px-10 py-4 rounded-full font-semibold text-white bg-gradient-to-r from-cyan-500 to-purple-600 hover:scale-105 transition-all font-nrt text-xl">
                    دووبارە کردنەوە
                </button>
            </div>
        </main>

    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
